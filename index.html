<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Birthday Cake</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f3e5f5; /* soft lavender background */
    flex-direction: column;
    font-family: "Comic Sans MS", cursive, sans-serif;
  }

  .cake {
    position: relative;
    width: 200px;
    height: 150px;
    background: #9b59b6; /* deep purple base */
    border-radius: 10px;
    box-shadow: inset 0 -10px #6c3483;
    text-align: center;
    color: white;
    font-weight: bold;
    padding-top: 50px;
  }

  .cake-message {
    position: absolute;
    width: 100%;
    top: 40px;
    font-size: 14px;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
  }

  .layer {
    position: absolute;
    width: 160px;
    height: 100px;
    background: #af7ac5; /* lighter purple layer */
    border-radius: 10px;
    left: 20px;
    top: -80px;
    box-shadow: inset 0 -8px #6c3483;
  }

  .top {
    position: absolute;
    width: 120px;
    height: 60px;
    background: #d2b4de; /* pastel purple top */
    border-radius: 10px;
    left: 40px;
    top: -120px;
    box-shadow: inset 0 -6px #6c3483;
  }

  .candle {
    position: absolute;
    width: 10px;
    height: 40px;
    background: #66ccff;
    left: 95px;
    top: -160px;
  }

  .flame {
    position: absolute;
    width: 20px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    left: -5px;
    top: -20px;
    animation: flicker 0.3s infinite alternate;
  }

  @keyframes flicker {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(1.2); opacity: 0.8; }
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #9b59b6;
    border: none;
    border-radius: 5px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px #6c3483;
  }

  button:hover {
    background: #8e44ad;
  }
</style>
</head>
<body>
  <div class="cake">
    <div class="layer"></div>
    <div class="top"></div>
    <div class="candle">
      <div class="flame" id="flame"></div>
    </div>
    <div class="cake-message">HAPPY BIRTHDAY, ATE NGL! HAHAHHAHA</div>
  </div>

  <audio id="music" src="https://github.com/elishajanep/HBD_NGL/raw/refs/heads/main/hbd.mp3" loop></audio>

  <!-- Start and Stop Music buttons -->
  <button onclick="document.getElementById('music').play()">Start Music 🎵</button>
  <button onclick="document.getElementById('music').pause()">Stop Music ✋</button>

<script>
  async function startMic() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(stream);
      const analyser = audioContext.createAnalyser();
      source.connect(analyser);

      const dataArray = new Uint8Array(analyser.fftSize);
      const flame = document.getElementById('flame');
      const music = document.getElementById('music');

      function checkVolume() {
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) {
          sum += Math.abs(dataArray[i] - 128);
        }
        const volume = sum / dataArray.length;

        if (volume > 20) { // threshold for "blowing"
          flame.style.display = 'none';
          music.play();
        }
        requestAnimationFrame(checkVolume);
      }
      checkVolume();
    } catch (err) {
      console.error('Microphone access denied:', err);
    }
  }

  startMic();
</script>
</body>
</html>
